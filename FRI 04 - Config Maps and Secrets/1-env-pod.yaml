apiVersion: v1
kind: Pod
metadata:
  name: env-test-pod
spec:
  containers:
  - name: my-app
    image: alpine
    command: [ "sleep", "3600" ] # Keeps the pod running so we can look inside
    env:
    # 1. Pulling a specific key from a ConfigMap
    - name: APP_THEME
      valueFrom:
        configMapKeyRef:
          name: ui-config
          key: theme
          
    # 2. Pulling a specific key from a Secret
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: password
